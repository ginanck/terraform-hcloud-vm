content: |-
  # Hetzner Cloud VM Terraform Module

  This module creates and manages Hetzner Cloud servers and related infrastructure using the hcloud provider.

  ## Features

  - Full server lifecycle management
  - Multi-server deployment via `for_each`
  - SSH key management
  - Private network and subnet support
  - Firewall rules with inbound/outbound support
  - Block volume management with automount
  - Placement groups for high availability
  - Reverse DNS configuration
  - Cloud-init / user data support
  - Public IPv4/IPv6 toggle
  - Flexible per-server overrides
  - Configurable via Terragrunt

  ## Usage

  ### Basic Example (Single Server)

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      my-key = "ssh-ed25519 AAAA... user@host"
    }

    servers = {
      web-server = {
        name        = "web-01"
        server_type = "cx22"
        image       = "ubuntu-24.04"
        location    = "nbg1"
        ssh_keys    = ["my-key"]
        labels      = { env = "production", role = "web" }
      }
    }
  }
  ```

  ### Multi-Server with Network and Firewall

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    firewalls = {
      web-fw = {
        rules = [
          {
            direction  = "in"
            protocol   = "tcp"
            port       = "22"
            source_ips = ["0.0.0.0/0", "::/0"]
          },
          {
            direction  = "in"
            protocol   = "tcp"
            port       = "80"
            source_ips = ["0.0.0.0/0", "::/0"]
          },
          {
            direction  = "in"
            protocol   = "tcp"
            port       = "443"
            source_ips = ["0.0.0.0/0", "::/0"]
          }
        ]
      }
    }

    networks = {
      internal = {
        ip_range = "10.0.0.0/16"
      }
    }

    subnets = {
      internal-subnet = {
        network_key  = "internal"
        ip_range     = "10.0.1.0/24"
        network_zone = "eu-central"
      }
    }

    servers = {
      app-01 = {
        name         = "app-01"
        server_type  = "cx32"
        image        = "ubuntu-24.04"
        location     = "fsn1"
        ssh_keys     = ["deploy-key"]
        firewall_keys = ["web-fw"]
        network_keys = ["internal"]
        private_ip   = "10.0.1.10"
        backups      = true
      }
      app-02 = {
        name         = "app-02"
        server_type  = "cx32"
        image        = "ubuntu-24.04"
        location     = "fsn1"
        ssh_keys     = ["deploy-key"]
        firewall_keys = ["web-fw"]
        network_keys = ["internal"]
        private_ip   = "10.0.1.11"
        backups      = true
      }
    }
  }
  ```

  ### Placement Groups

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    placement_groups = {
      web-spread = {
        type = "spread"
      }
    }

    servers = {
      web-01 = {
        name                = "web-01"
        ssh_keys            = ["deploy-key"]
        placement_group_key = "web-spread"
      }
      web-02 = {
        name                = "web-02"
        ssh_keys            = ["deploy-key"]
        placement_group_key = "web-spread"
      }
    }
  }
  ```

  ### Reverse DNS

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    servers = {
      mail-server = {
        name     = "mail-01"
        ssh_keys = ["deploy-key"]
        rdns     = "mail.example.com"
      }
    }
  }
  ```

  ### Cloud-Init / User Data

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    servers = {
      app-server = {
        name      = "app-01"
        ssh_keys  = ["deploy-key"]
        user_data = <<-EOT
          #cloud-config
          packages:
            - nginx
            - curl
          runcmd:
            - systemctl enable nginx
            - systemctl start nginx
        EOT
      }
    }
  }
  ```

  ### Public Network Toggle

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    networks = {
      internal = {
        ip_range = "10.0.0.0/16"
      }
    }

    subnets = {
      internal-subnet = {
        network_key  = "internal"
        ip_range     = "10.0.1.0/24"
        network_zone = "eu-central"
      }
    }

    servers = {
      private-server = {
        name              = "private-01"
        ssh_keys          = ["deploy-key"]
        public_ipv4_enabled = false
        public_ipv6_enabled = false
        network_keys      = ["internal"]
        private_ip        = "10.0.1.10"
      }
    }
  }
  ```

  ### Delete and Rebuild Protection

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      deploy-key = "ssh-ed25519 AAAA... deploy@ci"
    }

    servers = {
      critical-server = {
        name               = "critical-01"
        ssh_keys           = ["deploy-key"]
        delete_protection  = true
        rebuild_protection = true
      }
    }
  }
  ```

  ### Multiple Volumes per Server

  ```hcl
  module "hcloud_vm" {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"

    hcloud_token = var.hcloud_token

    ssh_keys = {
      admin = "ssh-ed25519 AAAA... admin@host"
    }

    servers = {
      db-server = {
        name        = "db-01"
        server_type = "cx42"
        image       = "debian-12"
        ssh_keys    = ["admin"]
      }
    }

    volumes = {
      db-data = {
        size       = 100
        server_key = "db-server"
        format     = "xfs"
        automount  = true
      }
      db-logs = {
        size       = 50
        server_key = "db-server"
        format     = "ext4"
        automount  = true
        labels     = { purpose = "logs" }
      }
    }
  }
  ```

  ### Terragrunt Example

  ```hcl
  terraform {
    source = "git::https://github.com/ginanck/terraform-hcloud-vm.git?ref=master"
  }

  inputs = {
    hcloud_token = get_env("HCLOUD_TOKEN")

    ssh_keys = {
      admin = "ssh-ed25519 AAAA... admin@host"
    }

    placement_groups = {
      db-spread = {}
    }

    servers = {
      db-server = {
        name                = "db-01"
        server_type         = "cx42"
        image               = "debian-12"
        location            = "nbg1"
        ssh_keys            = ["admin"]
        labels              = { env = "production", role = "database" }
        placement_group_key = "db-spread"
        delete_protection   = true
        rebuild_protection  = true
        rdns                = "db-01.example.com"
        user_data           = <<-EOT
          #cloud-config
          packages:
            - postgresql
        EOT
      }
    }

    volumes = {
      db-data = {
        size       = 100
        server_key = "db-server"
        format     = "xfs"
        automount  = true
      }
      db-logs = {
        size       = 50
        server_key = "db-server"
        format     = "ext4"
        automount  = true
        labels     = { purpose = "logs" }
      }
    }
  }
  ```

